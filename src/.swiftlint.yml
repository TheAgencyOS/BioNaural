# BioNaural SwiftLint Configuration
# Tuned for the project's design token system and architecture.

# Disable rules that conflict with design token naming (xs, sm, md, lg, xl, hr, hz)
identifier_name:
  excluded:
    - id
    - xs
    - sm
    - md
    - lg
    - xl
    - hr
    - hz
    - to
    # Math/graphics/audio: coordinates, loop indices, interpolation params
    - x
    - y
    - i
    - t
    - a
    - b
    - f
    - s
    - p
    - m
    - n
    - r
    - c
    - d
    - e
    - g
    - h
    - j
    - w
    - H
    - W
  min_length: 1

# Theme.swift is the centralized design token system (2000+ lines intentional)
# It's the single source of truth for all design tokens — splitting defeats the purpose.
file_length:
  warning: 700
  error: 2100

# Complex views may exceed default body length
type_body_length:
  warning: 400
  error: 600

function_body_length:
  warning: 60
  error: 100

line_length:
  warning: 150
  error: 300
  ignores_comments: true
  ignores_urls: true
  ignores_interpolated_strings: true

# Allow large tuples for HealthKit mock data
large_tuple:
  warning: 4

# Theme.swift uses 3-level nesting intentionally (Theme > Category > SubCategory)
# e.g. Theme.Colors.Hex, Theme.Typography.Size, Theme.Spacing.Session
nesting:
  type_level: 3
  function_level: 3

# Exclude generated files and tests
excluded:
  - BioNauralShared/Tests
  - build
