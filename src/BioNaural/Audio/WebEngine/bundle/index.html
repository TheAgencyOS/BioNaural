<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>BioNaural Audio Engine</title>
  <style>
    body { margin: 0; padding: 0; background: #000; color: #888; font: 10px monospace; overflow: hidden; }
    #log { padding: 4px; white-space: pre-wrap; max-height: 100vh; overflow-y: auto; }
  </style>
</head>
<body>
  <div id="log"></div>
  <script src="bionaural-engine.bundle.js"></script>
  <script>
    // Override console.log to show in both debug and WKWebView
    const logEl = document.getElementById('log');
    const origLog = console.log;
    console.log = (...args) => {
      origLog.apply(console, args);
      if (logEl) logEl.textContent += args.join(' ') + '\n';
    };
    console.error = (...args) => {
      origLog.apply(console, args);
      if (logEl) logEl.textContent += '[ERR] ' + args.join(' ') + '\n';
    };

    // The engine auto-initializes via the bundle.
    // Swift calls window.BioNauralEngine.start/stop/setVolume via evaluateJavaScript.
    console.log('[HTML] BioNaural WebEngine loaded');
  </script>
</body>
</html>
