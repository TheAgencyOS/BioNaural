<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <!-- Ambient glow - the light cast onto the canvas -->
    <radialGradient id="ambientGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6E7CF7" stop-opacity="0.25"/>
      <stop offset="40%" stop-color="#6E7CF7" stop-opacity="0.12"/>
      <stop offset="70%" stop-color="#6E7CF7" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#6E7CF7" stop-opacity="0"/>
    </radialGradient>

    <!-- Secondary ambient - deeper, wider bloom -->
    <radialGradient id="deepBloom" cx="50%" cy="52%" r="55%">
      <stop offset="0%" stop-color="#4A54C4" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#4A54C4" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#4A54C4" stop-opacity="0"/>
    </radialGradient>

    <!-- The Orb core gradient -->
    <radialGradient id="orbCore" cx="48%" cy="46%" r="32%">
      <stop offset="0%" stop-color="#F0F1FF" stop-opacity="1"/>
      <stop offset="15%" stop-color="#E8EAFF" stop-opacity="1"/>
      <stop offset="40%" stop-color="#9BA3FA" stop-opacity="1"/>
      <stop offset="65%" stop-color="#6E7CF7" stop-opacity="1"/>
      <stop offset="85%" stop-color="#5563D6" stop-opacity="1"/>
      <stop offset="100%" stop-color="#4A54C4" stop-opacity="0.9"/>
    </radialGradient>

    <!-- Orb edge softening -->
    <radialGradient id="orbEdge" cx="50%" cy="50%" r="30%">
      <stop offset="70%" stop-color="#6E7CF7" stop-opacity="0"/>
      <stop offset="88%" stop-color="#4A54C4" stop-opacity="0.4"/>
      <stop offset="95%" stop-color="#3D45A8" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#080C15" stop-opacity="0"/>
    </radialGradient>

    <!-- Specular highlight - upper left -->
    <radialGradient id="specular" cx="42%" cy="40%" r="18%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.35"/>
      <stop offset="40%" stop-color="#E8EAFF" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#E8EAFF" stop-opacity="0"/>
    </radialGradient>

    <!-- Inner light - adds depth -->
    <radialGradient id="innerLight" cx="50%" cy="48%" r="22%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#C5CBFF" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#6E7CF7" stop-opacity="0"/>
    </radialGradient>

    <!-- Blur filters for bloom effect -->
    <filter id="bloomWide" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="80"/>
    </filter>

    <filter id="bloomMedium" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="45"/>
    </filter>

    <filter id="bloomTight" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="20"/>
    </filter>

    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8"/>
    </filter>
  </defs>

  <!-- Canvas background -->
  <rect width="1024" height="1024" fill="#080C15"/>

  <!-- Very subtle background gradient for depth -->
  <rect width="1024" height="1024" fill="url(#deepBloom)"/>

  <!-- Wide ambient bloom - the light the orb casts -->
  <circle cx="512" cy="520" r="420" fill="#6E7CF7" opacity="0.08" filter="url(#bloomWide)"/>

  <!-- Medium bloom layer -->
  <circle cx="512" cy="515" r="320" fill="#6E7CF7" opacity="0.12" filter="url(#bloomMedium)"/>

  <!-- Ambient glow field -->
  <rect width="1024" height="1024" fill="url(#ambientGlow)"/>

  <!-- Tight bloom around the orb -->
  <circle cx="512" cy="512" r="240" fill="#6E7CF7" opacity="0.2" filter="url(#bloomTight)"/>

  <!-- The Orb - outer glow ring -->
  <circle cx="512" cy="512" r="220" fill="#6E7CF7" opacity="0.08" filter="url(#softGlow)"/>

  <!-- The Orb - main body -->
  <circle cx="512" cy="512" r="195" fill="url(#orbCore)"/>

  <!-- Orb edge definition -->
  <circle cx="512" cy="512" r="200" fill="url(#orbEdge)"/>

  <!-- Inner luminosity -->
  <circle cx="512" cy="505" r="180" fill="url(#innerLight)"/>

  <!-- Specular highlight -->
  <circle cx="512" cy="512" r="195" fill="url(#specular)"/>

  <!-- Tiny bright core point -->
  <circle cx="490" cy="480" r="35" fill="#FFFFFF" opacity="0.08" filter="url(#softGlow)"/>
</svg>