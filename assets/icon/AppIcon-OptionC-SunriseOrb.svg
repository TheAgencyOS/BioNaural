<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <!-- Dual ambient glow - warm/cool split -->
    <radialGradient id="c-coolAmbient" cx="38%" cy="42%" r="50%">
      <stop offset="0%" stop-color="#6E7CF7" stop-opacity="0.18"/>
      <stop offset="40%" stop-color="#6E7CF7" stop-opacity="0.08"/>
      <stop offset="70%" stop-color="#6E7CF7" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#6E7CF7" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="c-warmAmbient" cx="62%" cy="58%" r="50%">
      <stop offset="0%" stop-color="#F5A623" stop-opacity="0.12"/>
      <stop offset="35%" stop-color="#D4954A" stop-opacity="0.06"/>
      <stop offset="65%" stop-color="#D4954A" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#D4954A" stop-opacity="0"/>
    </radialGradient>

    <!-- Deep bloom -->
    <radialGradient id="c-deepBloom" cx="50%" cy="52%" r="55%">
      <stop offset="0%" stop-color="#4A54C4" stop-opacity="0.10"/>
      <stop offset="30%" stop-color="#5B4A8C" stop-opacity="0.06"/>
      <stop offset="60%" stop-color="#6B4A2A" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#080C15" stop-opacity="0"/>
    </radialGradient>

    <!-- Orb core - chromatic shift from cool to warm -->
    <radialGradient id="c-orbCore" cx="46%" cy="44%" r="33%">
      <stop offset="0%" stop-color="#FFF8F0" stop-opacity="1"/>
      <stop offset="12%" stop-color="#F0EDFF" stop-opacity="1"/>
      <stop offset="35%" stop-color="#9BA3FA" stop-opacity="1"/>
      <stop offset="55%" stop-color="#6E7CF7" stop-opacity="1"/>
      <stop offset="75%" stop-color="#7B6BCC" stop-opacity="1"/>
      <stop offset="90%" stop-color="#8B6AAA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#6B5A90" stop-opacity="0.85"/>
    </radialGradient>

    <!-- Warm accent overlay - lower right -->
    <radialGradient id="c-warmOverlay" cx="60%" cy="58%" r="30%">
      <stop offset="0%" stop-color="#F5A623" stop-opacity="0.25"/>
      <stop offset="30%" stop-color="#D4954A" stop-opacity="0.15"/>
      <stop offset="60%" stop-color="#D4954A" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#D4954A" stop-opacity="0"/>
    </radialGradient>

    <!-- Cool accent overlay - upper left -->
    <radialGradient id="c-coolOverlay" cx="40%" cy="42%" r="28%">
      <stop offset="0%" stop-color="#6E7CF7" stop-opacity="0.20"/>
      <stop offset="40%" stop-color="#5B6ABF" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#4A54C4" stop-opacity="0"/>
    </radialGradient>

    <!-- Orb edge -->
    <radialGradient id="c-orbEdge" cx="50%" cy="50%" r="30%">
      <stop offset="70%" stop-color="#6E7CF7" stop-opacity="0"/>
      <stop offset="85%" stop-color="#5B4A8C" stop-opacity="0.35"/>
      <stop offset="93%" stop-color="#4A3D70" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#080C15" stop-opacity="0"/>
    </radialGradient>

    <!-- Specular highlight -->
    <radialGradient id="c-specular" cx="41%" cy="39%" r="17%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.38"/>
      <stop offset="35%" stop-color="#E8EAFF" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#E8EAFF" stop-opacity="0"/>
    </radialGradient>

    <!-- Inner light -->
    <radialGradient id="c-innerLight" cx="48%" cy="46%" r="20%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.14"/>
      <stop offset="50%" stop-color="#E0D4FF" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#6E7CF7" stop-opacity="0"/>
    </radialGradient>

    <!-- Chromatic rim - subtle teal-to-amber ring -->
    <radialGradient id="c-rimTeal" cx="35%" cy="40%" r="30%">
      <stop offset="88%" stop-color="#4EA8A6" stop-opacity="0"/>
      <stop offset="93%" stop-color="#4EA8A6" stop-opacity="0.12"/>
      <stop offset="98%" stop-color="#4EA8A6" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="c-rimAmber" cx="65%" cy="60%" r="30%">
      <stop offset="88%" stop-color="#F5A623" stop-opacity="0"/>
      <stop offset="93%" stop-color="#F5A623" stop-opacity="0.10"/>
      <stop offset="98%" stop-color="#F5A623" stop-opacity="0"/>
    </radialGradient>

    <!-- Filters -->
    <filter id="c-bloomWide" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="80"/>
    </filter>

    <filter id="c-bloomMedium" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="45"/>
    </filter>

    <filter id="c-bloomTight" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="20"/>
    </filter>

    <filter id="c-softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8"/>
    </filter>

    <filter id="c-warmBloom" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="60"/>
    </filter>
  </defs>

  <!-- Canvas background -->
  <rect width="1024" height="1024" fill="#080C15"/>

  <!-- Deep bloom with warm-cool shift -->
  <rect width="1024" height="1024" fill="url(#c-deepBloom)"/>

  <!-- Wide cool ambient bloom - upper left -->
  <circle cx="460" cy="470" r="400" fill="#6E7CF7" opacity="0.06" filter="url(#c-bloomWide)"/>

  <!-- Wide warm ambient bloom - lower right -->
  <circle cx="570" cy="560" r="350" fill="#F5A623" opacity="0.04" filter="url(#c-warmBloom)"/>

  <!-- Ambient glow fields -->
  <rect width="1024" height="1024" fill="url(#c-coolAmbient)"/>
  <rect width="1024" height="1024" fill="url(#c-warmAmbient)"/>

  <!-- Medium cool bloom -->
  <circle cx="490" cy="500" r="300" fill="#6E7CF7" opacity="0.09" filter="url(#c-bloomMedium)"/>

  <!-- Medium warm bloom -->
  <circle cx="550" cy="540" r="260" fill="#D4954A" opacity="0.05" filter="url(#c-bloomMedium)"/>

  <!-- Tight bloom -->
  <circle cx="512" cy="512" r="240" fill="#6E7CF7" opacity="0.15" filter="url(#c-bloomTight)"/>

  <!-- Warm tight bloom accent -->
  <circle cx="545" cy="540" r="200" fill="#D4954A" opacity="0.06" filter="url(#c-bloomTight)"/>

  <!-- Orb outer glow -->
  <circle cx="512" cy="512" r="220" fill="#6E7CF7" opacity="0.06" filter="url(#c-softGlow)"/>

  <!-- The Orb - main body -->
  <circle cx="512" cy="512" r="195" fill="url(#c-orbCore)"/>

  <!-- Warm overlay on orb -->
  <circle cx="512" cy="512" r="195" fill="url(#c-warmOverlay)"/>

  <!-- Cool overlay on orb -->
  <circle cx="512" cy="512" r="195" fill="url(#c-coolOverlay)"/>

  <!-- Orb edge -->
  <circle cx="512" cy="512" r="200" fill="url(#c-orbEdge)"/>

  <!-- Chromatic rim hints -->
  <circle cx="512" cy="512" r="200" fill="url(#c-rimTeal)"/>
  <circle cx="512" cy="512" r="200" fill="url(#c-rimAmber)"/>

  <!-- Inner luminosity -->
  <circle cx="510" cy="502" r="175" fill="url(#c-innerLight)"/>

  <!-- Specular highlight -->
  <circle cx="512" cy="512" r="195" fill="url(#c-specular)"/>

  <!-- Bright core point -->
  <circle cx="485" cy="476" r="32" fill="#FFFFFF" opacity="0.09" filter="url(#c-softGlow)"/>
</svg>